<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <!-- JAVASCRIPT -->
    <script src="./assets/js/main.js" defer></script>

    <title>Frontend Mentor | Interactive rating component</title>
  </head>

  <body>
    <main class="container">
      <section id="question-section" class="question__section section">
        <article id="card-question" class="card__question">
          <picture class="card__img-question">
            <img src="./assets/images/icon-star.svg" alt="Star icon" />
          </picture>
          <div class="card__text">
            <h1>How did we do?</h1>
            <p>
              Please let us know how we did with your support request. All
              feedback is appreciated to help us improve our offering!
            </p>
            <fieldset class="fieldset-group">
              <div class="choices">
                <label for="score-1" class="choice">
                  <input
                    type="radio"
                    name="score"
                    id="score-1"
                    value="1"
                    aria-label="1 star rating"
                  />
                  <span class="custom__radio">1</span>
                </label>
                <label class="choice">
                  <input
                    type="radio"
                    name="score"
                    id="score-2"
                    value="2"
                    aria-label="2 stars rating"
                  />
                  <span class="custom__radio">2</span>
                </label>
                <label class="choice">
                  <input
                    type="radio"
                    name="score"
                    id="score-3"
                    value="3"
                    aria-label="3 stars rating"
                  />
                  <span class="custom__radio">3</span>
                </label>
                <label class="choice">
                  <input
                    type="radio"
                    name="score"
                    id="score-4"
                    value="4"
                    aria-label="4 stars rating"
                  />
                  <span class="custom__radio">4</span>
                </label>
                <label class="choice">
                  <input
                    type="radio"
                    name="score"
                    id="score-5"
                    value="5"
                    aria-label="5 stars rating"
                  />
                  <span class="custom__radio">5</span>
                </label>
              </div>
            </fieldset>
          </div>
          <button id="submit-btn">SUBMIT</button>
        </article>
      </section>

      <section id="thanks-section" class="thanks__section section">
        <article id="card-thanks" class="card__thanks">
          <picture class="card__img-thanks">
            <img src="./assets/images/illustration-thank-you.svg" alt="" />
          </picture>
          <p class="card__score">
            You selected <span id="card-score"></span> out of 5
          </p>
          <div class="card__text">
            <h1>Thank you!</h1>
            <p>
              We appreciate you taking the time to give a rating. If you ever
              need more support, don’t hesitate to get in touch!
            </p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
